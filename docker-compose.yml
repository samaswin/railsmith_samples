# Services for exercising Railsmith async nested writes against real queue
# backends. Bring up with:
#
#   docker compose up -d
#
# Then run the real-jobs integration suite from the repo root:
#
#   bundle exec rails runner test_railsmith_real_jobs.rb
#
# Notes:
# * Postgres is published on the standard port 5432 with the same credentials
#   the checked-in config/database.yml expects (user: aswin, password: aswin).
#   If you already run a local Postgres on 5432 you'll either need to stop it
#   or change the host port below (e.g. "5433:5432") and update database.yml.
# * Redis is published on 6379 for Sidekiq.
# * RabbitMQ is optional; only needed for the Sneakers/Kicks sections. The
#   management UI is at http://localhost:15672 (guest/guest).

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aswin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aswin}
      POSTGRES_DB: ${POSTGRES_DB:-app_development}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aswin} -d ${POSTGRES_DB:-app_development}"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
